{% extends 'base.html' %}

{% block title %}Admin Login - SecureWeb{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 5vh; margin-bottom: 5vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-shield fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Administrator Panel</h3>
                <p class="text-muted small">Sign in to view and manage logged fraud reports</p>
            </div>
            
            <form action="/login" method="POST">
                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label fw-600">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 border-info-subtle"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" class="form-control form-control-custom border-start-0 ps-0" id="username" name="username" required placeholder="Enter admin username">
                    </div>
                </div>
                
                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-600">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 border-info-subtle"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control form-control-custom border-start-0 ps-0" id="password" name="password" required placeholder="Enter password">
                    </div>
                </div>
                
                <!-- Submit -->
                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-custom-primary"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
                </div>
            </form>
            
            <div class="mt-4 text-center">
                <a href="/" class="small text-decoration-none text-muted"><i class="fa-solid fa-arrow-left me-1"></i> Back to Homepage</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
